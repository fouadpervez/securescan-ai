<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureScan AI | Link & File Security</title>
    <style>
        :root {
            --primary: #2563eb;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #cbd5e1;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: var(--surface);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { margin-top: 0; font-size: 24px; color: var(--primary); }
        p { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: left;
            color: var(--text);
        }

        /* Link Scanner Styles */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        input[type="url"] {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="url"]:focus { border-color: var(--primary); }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #94a3b8;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
        .divider::before { margin-right: .5em; }
        .divider::after { margin-left: .5em; }

        /* File Scanner Styles */
        .file-upload-container {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .file-label {
            flex: 1;
            padding: 12px;
            background-color: #f1f5f9;
            border: 1px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .file-label:hover { background-color: #e2e8f0; border-color: var(--primary); }
        .file-label input { display: none; }
        
        #file-status {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 12px;
            font-style: italic;
            word-break: break-all;
        }

        /* Common Buttons & Results */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        
        #result { margin-top: 20px; padding: 16px; border-radius: 8px; font-weight: bold; display: none; text-align: left;}
        .safe { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .danger { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #94a3b8;
            font-weight: 500;
        }
        .footer-highlight { color: var(--text); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛡️ SecureScan AI</h1>
        <p>Scan suspicious links, downloaded files, or entire folders before opening them to protect your device from malware.</p>
        
        <div class="section-title">1. Scan a Link</div>
        <div class="input-group">
            <input type="url" id="urlInput" placeholder="Paste suspicious link here...">
            <button id="scanUrlBtn" onclick="scanUrl()">Scan Link</button>
        </div>

        <div class="divider">OR</div>

        <div class="section-title">2. Scan a File or Folder</div>
        <div class="file-upload-container">
            <label class="file-label">
                📄 Select File(s)
                <input type="file" id="fileInput" multiple onchange="updateFileStatus(this, 'files')">
            </label>
            <label class="file-label">
                📁 Select Folder
                <input type="file" id="folderInput" webkitdirectory directory multiple onchange="updateFileStatus(this, 'folder')">
            </label>
        </div>
        <div id="file-status">No files selected</div>
        <button id="scanFileBtn" onclick="scanFiles()" disabled style="background-color: #93c5fd;">Scan Selected Items</button>

        <div id="result"></div>
    </div>

    <div class="footer">
        Designed & Built by 
        <a href="https://www.linkedin.com/in/fouadpervezmarketing/" target="_blank" style="color: var(--text); font-weight: bold; text-decoration: none; border-bottom: 2px solid var(--primary); transition: opacity 0.2s;">
            Fouad
        </a>
    </div>

    <script>
        // Store selected files temporarily
        let filesToScan = [];

        // Update UI when files or folders are selected
        function updateFileStatus(input, type) {
            const statusDiv = document.getElementById('file-status');
            const scanBtn = document.getElementById('scanFileBtn');
            
            if (input.files.length > 0) {
                filesToScan = Array.from(input.files);
                
                if (type === 'folder') {
                    statusDiv.innerText = `Folder selected containing ${filesToScan.length} files.`;
                } else {
                    const fileNames = filesToScan.map(f => f.name).join(', ');
                    statusDiv.innerText = filesToScan.length > 1 ? `${filesToScan.length} files selected.` : `Selected: ${fileNames}`;
                }
                
                // Enable the scan button
                scanBtn.disabled = false;
                scanBtn.style.backgroundColor = "var(--primary)";
            } else {
                filesToScan = [];
                statusDiv.innerText = "No files selected";
                scanBtn.disabled = true;
                scanBtn.style.backgroundColor = "#93c5fd";
            }
        }

        // Display results dynamically
        function showResult(type, title, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = "block";
            
            if (type === 'danger') {
                resultDiv.className = "danger";
                resultDiv.innerHTML = `🚨 <strong>${title}</strong><br><br><span style='font-size:13px; font-weight:normal;'>${message}</span>`;
            } else {
                resultDiv.className = "safe";
                resultDiv.innerHTML = `✅ <strong>${title}</strong><br><br><span style='font-size:13px; font-weight:normal;'>${message}</span>`;
            }
        }

       async function scanUrl() {
            const urlInput = document.getElementById('urlInput').value;
            const scanBtn = document.getElementById('scanUrlBtn');
            const resultDiv = document.getElementById('result');

            if (!urlInput) return alert("Please enter a link to scan.");

            scanBtn.innerText = "Consulting Cloud Intelligence...";
            scanBtn.disabled = true;
            resultDiv.style.display = "none";

            try {
                // 1. Talk to your hidden Middleman
                const response = await fetch(`/.netlify/functions/scan?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                // 2. Catch backend/API errors immediately
                if (data.error) {
                    throw new Error(data.error); 
                }

                // 3. Check if VirusTotal is still "thinking"
                if (data.data.attributes.status === "queued") {
                    throw new Error("VirusTotal is currently analyzing this link. Please wait 15 seconds and scan again.");
                }

                // 4. Open the correct drawer named "stats"
                const stats = data.data.attributes.stats;
                const totalScans = stats.harmless + stats.undetected + stats.malicious + stats.suspicious;

                // 5. The Final Logic: Danger or Safe
                if (stats.malicious > 0 || stats.suspicious > 0) {
                    showResult('danger', 'MALWARE DETECTED!', `${stats.malicious} security vendors flagged this link as dangerous. Do not open it.`);
                } else {
                    showResult('success', 'SAFE LINK', `Verified by ${totalScans} security vendors. No known threats found.`);
                }

            } catch (error) {
                // This catches ANY error and puts it in the red box
                showResult('danger', 'SCAN FAILED', error.message);
            }

            scanBtn.innerText = "Scan Another Link";
            scanBtn.disabled = false;
        }
        // REAL FILE SCANNING LOGIC
        async function scanFiles() {
            const scanBtn = document.getElementById('scanFileBtn');
            const resultDiv = document.getElementById('result');

            if (filesToScan.length === 0) return;

            // We will scan the first selected file for this prototype
            const file = filesToScan[0]; 

            // 🚨 NEW LETHAL EXTENSION BLOCKER 🚨
            const dangerousExtensions = ['.exe', '.bat', '.scr', '.vbs', '.iso', '.msi'];
            const fileExt = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();

            if (dangerousExtensions.includes(fileExt)) {
                showResult('danger', 'CRITICAL THREAT BLOCKED', `You attempted to scan an executable file (${fileExt}). Hackers disguise these as PDFs to install ransomware. Delete this file from your computer immediately.`);
                scanBtn.innerText = "Scan Selected Items";
                scanBtn.disabled = false;
                return; // Stop the scan completely
            }

            // Enforce the 4MB memory limit securely
            if (file.size > 4 * 1024 * 1024) {
                showResult('danger', 'File Too Large', `This file is ${(file.size / 1024 / 1024).toFixed(1)}MB. Our secure proxy limits uploads to 4MB to prevent server compromise.`);
                return;
            }

            scanBtn.innerText = `Encrypting and sending ${file.name}...`;
            scanBtn.disabled = true;
            resultDiv.style.display = "none";

            try {
                // 1. Convert the physical file into a Base64 text string
                const base64String = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]); // Grab just the raw data
                    reader.onerror = error => reject(error);
                });

                scanBtn.innerText = `Analyzing in the cloud...`;

                // 2. Send the text string securely to your Netlify backend
                const response = await fetch('/.netlify/functions/scan-file', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileName: file.name,
                        fileBase64: base64String
                    })
                });

                const data = await response.json();

                if (data.error) {
                    showResult('danger', 'API Error', data.error.message || data.error);
                } else {
                    // Notify the user it was successfully sent to the lab!
                    showResult('safe', 'File Successfully Sent to Cloud Lab!', `VirusTotal ID: ${data.data.id}. <br><br>The file has been safely removed from your browser and is currently being detonated in a secure environment.`);
                }
            } catch (error) {
                showResult('danger', 'Upload Failed', 'Could not securely transmit the file to the threat database.');
            }

            scanBtn.innerText = "Scan Selected Items";
            scanBtn.disabled = false;
        }
    </script>
</body>
</html>
